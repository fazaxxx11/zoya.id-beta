name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-build-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npx eslint api/ src/ --max-warnings=3500

      - name: Build
        run: npm run build

      - name: Security audit
        run: npm audit --audit-level=critical
        continue-on-error: true
