<?xml version="1.0" encoding="UTF-8"?>
<!--
  Zoya logo — stylized cursive "Z" with brand gradient.
  Recreated from PNG; for pixel-perfect rendering, also drop the original
  PNG at /public/logo.png and the <Logo> component will prefer it.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Zoya logo">
  <defs>
    <linearGradient id="zoyaGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3b82f6"/>
      <stop offset="35%"  stop-color="#a855f7"/>
      <stop offset="70%"  stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="zoyaGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Cursive Z drawn as a stroked path. Designed to mimic the script Z:
       top loop curling at upper-right, diagonal slash, lower loop with flourish. -->
  <g filter="url(#zoyaGlow)" stroke="url(#zoyaGrad)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- main Z body -->
    <path d="M 55 70
             C 60 50, 100 45, 135 55
             C 150 60, 145 75, 130 72
             C 115 70, 95 80, 80 95
             L 145 130
             C 155 135, 150 150, 130 152
             C 100 155, 75 145, 60 138"
          stroke-width="11"/>
    <!-- upper-right curl (small loop / sparkle) -->
    <path d="M 135 55 C 148 52, 152 65, 142 68" stroke-width="9"/>
    <!-- bottom-left curl flourish -->
    <path d="M 60 138 C 48 138, 45 125, 58 122" stroke-width="9"/>
  </g>

  <!-- sparkle dots at flourish tail (gold accent) -->
  <g fill="#f59e0b" opacity="0.85">
    <circle cx="148" cy="148" r="1.6"/>
    <circle cx="152" cy="142" r="1.2"/>
    <circle cx="144" cy="153" r="1"/>
    <circle cx="156" cy="146" r="0.9"/>
  </g>
</svg>
