<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c071e"/>
      <stop offset="50%" stop-color="#1a0d3a"/>
      <stop offset="100%" stop-color="#2d1b69"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Decorative grid (subtle) -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <path d="M0 80 H1200 M0 160 H1200 M0 240 H1200 M0 320 H1200 M0 400 H1200 M0 480 H1200 M0 560 H1200"/>
    <path d="M80 0 V630 M160 0 V630 M240 0 V630 M320 0 V630 M400 0 V630 M480 0 V630 M560 0 V630 M640 0 V630 M720 0 V630 M800 0 V630 M880 0 V630 M960 0 V630 M1040 0 V630 M1120 0 V630"/>
  </g>

  <!-- Brand mark -->
  <g transform="translate(80, 80)">
    <rect width="56" height="56" rx="14" fill="url(#brand)"/>
    <text x="28" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="800" font-size="28" fill="#ffffff">z</text>
  </g>
  <text x="160" y="118" font-family="system-ui, sans-serif" font-weight="700" font-size="32" fill="#ffffff">zoya.id</text>

  <!-- Pill -->
  <g transform="translate(80, 200)">
    <rect width="380" height="40" rx="20" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.15"/>
    <circle cx="22" cy="20" r="5" fill="#10b981"/>
    <text x="40" y="26" font-family="system-ui, sans-serif" font-size="15" fill="#cbd5e1">
      Implementasi statistik akademik
    </text>
  </g>

  <!-- Headline -->
  <text x="80" y="320" font-family="system-ui, sans-serif" font-weight="800" font-size="64" fill="#ffffff">
    Penelitian &amp; assessment,
  </text>
  <text x="80" y="396" font-family="system-ui, sans-serif" font-weight="800" font-size="64" fill="url(#brand)">
    akademis dan terverifikasi.
  </text>

  <!-- Subtitle -->
  <text x="80" y="466" font-family="system-ui, sans-serif" font-size="22" fill="#cbd5e1" opacity="0.85">
    Validitas · Reliabilitas · Korelasi · Regresi · Mediasi · EFA · Logistik
  </text>

  <!-- Trust strip -->
  <g transform="translate(80, 530)" font-family="system-ui, sans-serif" font-size="18" fill="#cbd5e1">
    <g>
      <circle cx="10" cy="0" r="6" fill="#10b981"/>
      <text x="24" y="6">Hasil deterministik</text>
    </g>
    <g transform="translate(280, 0)">
      <circle cx="10" cy="0" r="6" fill="#10b981"/>
      <text x="24" y="6">Format APA 7</text>
    </g>
    <g transform="translate(490, 0)">
      <circle cx="10" cy="0" r="6" fill="#10b981"/>
      <text x="24" y="6">Verifikasi R / SPSS</text>
    </g>
    <g transform="translate(740, 0)">
      <circle cx="10" cy="0" r="6" fill="#10b981"/>
      <text x="24" y="6">100% di browser</text>
    </g>
  </g>
</svg>
